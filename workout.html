<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Suki 训练语音提示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;
  --card:#1a1a1a;
  --card2:#222;
  --accent:#6c63ff;
  --accent2:#ff6b9d;
  --green:#4ecdc4;
  --warn:#ffbe76;
  --text:#e8e8f0;
  --muted:#888;
  --radius:18px;
}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  padding:0 16px 40px;
}

/* ── Header ── */
header{
  width:100%;
  max-width:480px;
  text-align:center;
  padding:32px 0 20px;
}
header h1{
  font-size:1.5rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  font-weight:700;
}
header p{font-size:0.85rem;color:var(--muted);margin-top:6px}

/* ── Progress bar ── */
.progress-wrap{
  width:100%;
  max-width:480px;
  margin-bottom:20px;
}
.progress-label{
  display:flex;
  justify-content:space-between;
  font-size:0.78rem;
  color:var(--muted);
  margin-bottom:6px;
}
.progress-bar{
  width:100%;
  height:6px;
  background:#2a2a2a;
  border-radius:3px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:3px;
  transition:width 0.5s ease;
  width:0%;
}

/* ── Main card ── */
.main-card{
  width:100%;
  max-width:480px;
  background:var(--card);
  border-radius:var(--radius);
  padding:28px 24px;
  border:1px solid rgba(108,99,255,0.2);
  margin-bottom:20px;
  text-align:center;
  min-height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
}

.state-idle .exercise-name{display:none}
.state-idle .set-info{display:none}
.state-idle .reps-info{display:none}
.state-idle .timer-block{display:none}

.exercise-emoji{
  font-size:3rem;
  line-height:1;
}
.exercise-name{
  font-size:1.6rem;
  font-weight:700;
  color:var(--text);
}
.exercise-name-en{
  font-size:0.82rem;
  color:var(--muted);
  margin-top:-6px;
}
.set-info{
  font-size:1rem;
  color:var(--accent);
  font-weight:600;
  background:rgba(108,99,255,0.12);
  padding:4px 16px;
  border-radius:20px;
}
.reps-info{
  font-size:0.95rem;
  color:var(--muted);
}

/* idle message */
.idle-msg{
  font-size:1.1rem;
  color:var(--muted);
  line-height:1.8;
}
.idle-msg strong{
  display:block;
  font-size:1.4rem;
  color:var(--text);
  margin-bottom:8px;
}

/* ── Timer block ── */
.timer-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
}
.timer-label{
  font-size:0.82rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:1px;
}
.timer-ring{
  position:relative;
  width:100px;
  height:100px;
}
.timer-ring svg{
  transform:rotate(-90deg);
}
.timer-ring circle{
  fill:none;
  stroke-width:6;
}
.timer-ring .bg{stroke:#2a2a2a}
.timer-ring .fg{
  stroke:var(--accent);
  stroke-linecap:round;
  transition:stroke-dashoffset 1s linear;
}
.timer-number{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:1.8rem;
  font-weight:700;
  color:var(--text);
}

/* ── Phase label ── */
.phase-label{
  font-size:0.9rem;
  font-weight:600;
  padding:6px 18px;
  border-radius:20px;
  letter-spacing:0.5px;
}
.phase-working{background:rgba(78,205,196,0.15);color:var(--green)}
.phase-rest{background:rgba(255,190,118,0.15);color:var(--warn)}
.phase-done{background:rgba(108,99,255,0.15);color:var(--accent)}

/* ── Workout list ── */
.workout-list{
  width:100%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:24px;
}
.workout-item{
  background:var(--card2);
  border-radius:12px;
  padding:14px 18px;
  display:flex;
  align-items:center;
  gap:14px;
  border:1px solid transparent;
  transition:border-color 0.3s, background 0.3s;
}
.workout-item.active{
  border-color:var(--accent);
  background:rgba(108,99,255,0.08);
}
.workout-item.done{
  opacity:0.45;
}
.wi-emoji{font-size:1.4rem}
.wi-info{flex:1}
.wi-name{font-size:0.95rem;font-weight:600}
.wi-detail{font-size:0.78rem;color:var(--muted);margin-top:2px}
.wi-check{
  font-size:1.2rem;
  color:var(--green);
  opacity:0;
  transition:opacity 0.3s;
}
.workout-item.done .wi-check{opacity:1}

/* ── Buttons ── */
.btn-row{
  width:100%;
  max-width:480px;
  display:flex;
  gap:12px;
  margin-bottom:16px;
}
.btn{
  flex:1;
  padding:16px 12px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:700;
  cursor:pointer;
  transition:transform 0.1s, opacity 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.96)}
.btn-start{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  font-size:1.15rem;
  padding:20px;
}
.btn-pause{
  background:#2a2a2a;
  color:var(--text);
}
.btn-reset{
  background:#2a2a2a;
  color:var(--muted);
  flex:0 0 auto;
  padding:16px 20px;
}
.btn:disabled{opacity:0.35;cursor:not-allowed}

/* ── Voice status ── */
.voice-status{
  font-size:0.78rem;
  color:var(--muted);
  text-align:center;
  margin-top:4px;
}
.voice-dot{
  display:inline-block;
  width:7px;height:7px;
  border-radius:50%;
  background:var(--muted);
  margin-right:5px;
  vertical-align:middle;
}
.voice-dot.speaking{
  background:var(--green);
  animation:pulse 0.8s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Completion overlay ── */
.overlay{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(13,13,13,0.92);
  z-index:100;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  text-align:center;
  padding:32px;
}
.overlay.show{display:flex}
.overlay-emoji{font-size:5rem}
.overlay h2{
  font-size:1.8rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.overlay p{color:var(--muted);font-size:1rem;line-height:1.7}
.overlay .btn-start{max-width:240px;width:100%}

footer{
  color:var(--muted);
  font-size:0.75rem;
  text-align:center;
  margin-top:auto;
  padding-top:20px;
}

/* ── Exercise Animations ── */
.ex-anim-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:4px 0;
  min-height:110px;
}

/* shared figure base */
.anim-fig{display:block;overflow:visible}
.anim-fig .ap{
  fill:none;
  stroke:var(--accent);
  stroke-width:2.5;
  stroke-linecap:round;
  stroke-linejoin:round;
}
.anim-fig .ap-head{
  fill:none;
  stroke:var(--accent);
  stroke-width:2.5;
}
/* SVG groups with transform-box so transform-origin works relative to element */
.anim-fig g{transform-box:fill-box;transform-origin:top center}

/* ── 1. 哑铃卧推 (Bench Press) — lying, arms push up/down ── */
@keyframes bench-l-arm{
  0%,100%{transform:rotate(-50deg)}
  50%{transform:rotate(-5deg)}
}
@keyframes bench-r-arm{
  0%,100%{transform:rotate(50deg)}
  50%{transform:rotate(5deg)}
}
.bench-l-arm{animation:bench-l-arm 1.8s ease-in-out infinite}
.bench-r-arm{animation:bench-r-arm 1.8s ease-in-out infinite}

/* ── 2. 高位下拉 (Lat Pulldown) — seated, arms overhead to chest ── */
@keyframes lat-l-arm{
  0%,100%{transform:rotate(-65deg)}
  50%{transform:rotate(-10deg)}
}
@keyframes lat-r-arm{
  0%,100%{transform:rotate(65deg)}
  50%{transform:rotate(10deg)}
}
.lat-l-arm{animation:lat-l-arm 2s ease-in-out infinite}
.lat-r-arm{animation:lat-r-arm 2s ease-in-out infinite}

/* ── 3. 哑铃肩推 (Shoulder Press) — standing, arms push overhead ── */
@keyframes press-l-arm{
  0%,100%{transform:rotate(-25deg)}
  50%{transform:rotate(-85deg)}
}
@keyframes press-r-arm{
  0%,100%{transform:rotate(25deg)}
  50%{transform:rotate(85deg)}
}
.press-l-arm{animation:press-l-arm 1.8s ease-in-out infinite}
.press-r-arm{animation:press-r-arm 1.8s ease-in-out infinite}

/* ── 4. 坐姿绳索划船 (Seated Cable Row) — seated, arms pull to abdomen ── */
@keyframes row-l-arm{
  0%,100%{transform:rotate(-15deg)}
  50%{transform:rotate(-65deg)}
}
@keyframes row-r-arm{
  0%,100%{transform:rotate(15deg)}
  50%{transform:rotate(65deg)}
}
.row-l-arm{animation:row-l-arm 2s ease-in-out infinite}
.row-r-arm{animation:row-r-arm 2s ease-in-out infinite}

/* paused state */
.anim-paused .bench-l-arm,
.anim-paused .bench-r-arm,
.anim-paused .lat-l-arm,
.anim-paused .lat-r-arm,
.anim-paused .press-l-arm,
.anim-paused .press-r-arm,
.anim-paused .row-l-arm,
.anim-paused .row-r-arm{
  animation-play-state:paused;
}

/* ── Exercise Instructions ── */
.ex-instructions{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(108,99,255,0.15);
  border-radius:12px;
  overflow:hidden;
  text-align:left;
}
.ex-instructions summary{
  padding:9px 14px;
  font-size:0.78rem;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  user-select:none;
  letter-spacing:0.4px;
  list-style:none;
  display:flex;
  align-items:center;
  gap:6px;
}
.ex-instructions summary::-webkit-details-marker{display:none}
.ex-instructions summary::before{
  content:'▸';
  font-size:0.7rem;
  transition:transform 0.2s;
  display:inline-block;
}
.ex-instructions[open] summary::before{
  transform:rotate(90deg);
}
.ex-instructions-body{
  padding:0 14px 12px;
}
.ex-step{
  font-size:0.78rem;
  color:#b8b8cc;
  line-height:1.65;
  padding:2px 0;
  display:flex;
  gap:8px;
}
.ex-step-num{
  color:var(--accent);
  font-weight:700;
  flex-shrink:0;
  min-width:16px;
}
.ex-warn{
  font-size:0.76rem;
  color:var(--warn);
  margin-top:8px;
  padding:5px 10px;
  background:rgba(255,190,118,0.08);
  border-radius:8px;
  border-left:2px solid var(--warn);
}
</style>
</head>
<body>

<header>
  <h1>🏋️ 训练语音提示</h1>
  <p>Suki 增肌计划 · 复出阶段</p>
</header>

<!-- Progress -->
<div class="progress-wrap">
  <div class="progress-label">
    <span id="progressText">准备开始</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<!-- Main card -->
<div class="main-card" id="mainCard">
  <div class="idle-msg" id="idleMsg">
    <strong>准备好了吗？</strong>
    点击下方「开始训练」<br>语音将全程引导你完成<br>今天的 4 个动作
  </div>

  <div id="activeContent" style="display:none;flex-direction:column;align-items:center;gap:12px;width:100%">
    <div class="exercise-emoji" id="exEmoji">💪</div>
    <div class="phase-label phase-working" id="phaseLabel">训练中</div>
    <div class="exercise-name" id="exName">哑铃卧推</div>
    <div class="exercise-name-en" id="exNameEn">Dumbbell Bench Press</div>
    <div class="set-info" id="setInfo">第 1 组 / 共 2 组</div>
    <div class="reps-info" id="repsInfo">× 10 次</div>

    <!-- Exercise animation -->
    <div class="ex-anim-wrap" id="exAnimWrap">
      <svg id="exAnimSvg" class="anim-fig" width="64" height="110" viewBox="0 0 64 110"></svg>
    </div>

    <!-- Exercise instructions -->
    <details class="ex-instructions" id="exInstructions" open>
      <summary>动作要领</summary>
      <div class="ex-instructions-body" id="exInstructionsBody"></div>
    </details>

    <div class="timer-block" id="timerBlock" style="display:none">
      <div class="timer-label" id="timerLabel">休息倒计时</div>
      <div class="timer-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle class="bg" cx="50" cy="50" r="44"/>
          <circle class="fg" id="timerArc" cx="50" cy="50" r="44"
            stroke-dasharray="276.46" stroke-dashoffset="0"/>
        </svg>
        <div class="timer-number" id="timerNum">90</div>
      </div>
    </div>
  </div>
</div>

<!-- Workout list -->
<div class="workout-list" id="workoutList"></div>

<!-- Buttons -->
<div class="btn-row" style="max-width:480px;width:100%">
  <button class="btn btn-start" id="btnStart" onclick="startWorkout()">开始训练</button>
</div>
<div class="btn-row" style="max-width:480px;width:100%">
  <button class="btn btn-pause" id="btnPause" onclick="togglePause()" disabled>暂停</button>
  <button class="btn btn-reset" id="btnReset" onclick="resetWorkout()" disabled>重置</button>
</div>

<div class="voice-status">
  <span class="voice-dot" id="voiceDot"></span>
  <span id="voiceStatusText">语音就绪</span>
</div>

<!-- Completion overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-emoji">🎉</div>
  <h2>训练完成！</h2>
  <p>今天的 4 个动作全部完成<br>干得好，Suki！💪<br><br>记得补充蛋白质和水分</p>
  <button class="btn btn-start" onclick="resetWorkout();document.getElementById('overlay').classList.remove('show')">再来一次</button>
</div>

<footer>为 Suki 定制 · 安全训练，循序渐进 🏋️‍♀️</footer>

<script>
// ── Workout data ──
const EXERCISES = [
  {
    name:'哑铃卧推', nameEn:'Dumbbell Bench Press', emoji:'💪',
    sets:2, reps:10, restSet:90, restEx:120,
    steps:['仰卧凳上，肩胛骨后缩下沉，双脚踩实地面','哑铃置于胸部两侧，掌心向前，大臂约呈 45°','吸气，控制性下放至胸部旁，肘约 90°','呼气，胸肌发力推回，不锁死肘关节'],
    warn:'别让肩膀耸起来代偿'
  },
  {
    name:'高位下拉', nameEn:'Lat Pulldown', emoji:'🏋️',
    sets:2, reps:12, restSet:90, restEx:120,
    steps:['坐稳，双腿压住固定垫，上身微微后倾','宽握横杆，掌心向前，手比肩略宽','呼气，以肘部引导向下拉，想象把肘拉进口袋','下拉至下巴位置，感受背阔肌收缩 1 秒','吸气，缓慢还原，肩胛骨前伸感受拉伸'],
    warn:'不要靠身体后仰借力'
  },
  {
    name:'哑铃肩推', nameEn:'Dumbbell Shoulder Press', emoji:'🙌',
    sets:2, reps:10, restSet:90, restEx:120,
    steps:['坐姿，腰背挺直，核心收紧','哑铃置于耳朵两侧，掌心向前','呼气，向正上方推举，顶部手腕不要过度内扣','吸气，控制性下放回起始位置'],
    warn:'不要用腰部借力拱背'
  },
  {
    name:'坐姿绳索划船', nameEn:'Seated Cable Row', emoji:'🚣',
    sets:2, reps:12, restSet:90, restEx:0,
    steps:['坐稳，双脚踩踏板，膝盖微屈，挺胸收腹','起始手臂伸直，感受背部被拉伸','呼气，以肘引导向后拉，肩胛骨后缩夹紧','拉至腹部停顿 1 秒，感受背肌收缩','吸气，缓慢还原，不要被重量拽回去'],
    warn:'身体不要前后摇晃借力'
  },
];
const TOTAL_SETS = EXERCISES.reduce((s,e)=>s+e.sets,0); // 8

// ── State ──
let state = 'idle'; // idle | working | resting | paused | done
let exIdx = 0, setIdx = 0;
let timerInterval = null;
let timerRemaining = 0;
let timerTotal = 0;
let pausedState = null;
let setsCompleted = 0;

// ── Speech ──
const synth = window.speechSynthesis;
let speaking = false;

function speak(text, onEnd) {
  if (!synth) { onEnd && onEnd(); return; }
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'zh-CN';
  utt.rate = 0.95;
  utt.pitch = 1.05;
  utt.volume = 1;
  utt.onstart = () => { speaking = true; updateVoiceDot(); };
  utt.onend = () => { speaking = false; updateVoiceDot(); onEnd && onEnd(); };
  utt.onerror = () => { speaking = false; updateVoiceDot(); onEnd && onEnd(); };
  synth.speak(utt);
}

function updateVoiceDot() {
  const dot = document.getElementById('voiceDot');
  const txt = document.getElementById('voiceStatusText');
  if (speaking) {
    dot.classList.add('speaking');
    txt.textContent = '语音播报中…';
  } else {
    dot.classList.remove('speaking');
    txt.textContent = '语音就绪';
  }
}

// ── Build workout list ──
function buildList() {
  const list = document.getElementById('workoutList');
  list.innerHTML = '';
  EXERCISES.forEach((ex, i) => {
    const div = document.createElement('div');
    div.className = 'workout-item';
    div.id = 'wi-' + i;
    div.innerHTML = `
      <div class="wi-emoji">${ex.emoji}</div>
      <div class="wi-info">
        <div class="wi-name">${ex.name}</div>
        <div class="wi-detail">${ex.sets} 组 × ${ex.reps} 次</div>
      </div>
      <div class="wi-check">✓</div>`;
    list.appendChild(div);
  });
}

// ── Progress ──
function updateProgress() {
  const pct = Math.round((setsCompleted / TOTAL_SETS) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
  const ex = EXERCISES[exIdx];
  if (state === 'idle') {
    document.getElementById('progressText').textContent = '准备开始';
  } else if (state === 'done') {
    document.getElementById('progressText').textContent = '训练完成 🎉';
  } else {
    document.getElementById('progressText').textContent =
      `动作 ${exIdx+1}/${EXERCISES.length} · 第 ${setIdx+1} 组`;
  }
}

// ── Timer ring ──
const CIRC = 2 * Math.PI * 44; // 276.46
function updateRing(remaining, total) {
  const arc = document.getElementById('timerArc');
  const num = document.getElementById('timerNum');
  const frac = total > 0 ? remaining / total : 0;
  arc.style.strokeDashoffset = CIRC * (1 - frac);
  num.textContent = remaining;
  // colour shift: green when plenty, orange when low
  arc.style.stroke = remaining <= 10 ? 'var(--warn)' : 'var(--accent)';
}

// ── Show active UI ──
function showActive(ex) {
  document.getElementById('idleMsg').style.display = 'none';
  const ac = document.getElementById('activeContent');
  ac.style.display = 'flex';
  document.getElementById('exEmoji').textContent = ex.emoji;
  document.getElementById('exName').textContent = ex.name;
  document.getElementById('exNameEn').textContent = ex.nameEn;
  document.getElementById('setInfo').textContent = `第 ${setIdx+1} 组 / 共 ${ex.sets} 组`;
  document.getElementById('repsInfo').textContent = `× ${ex.reps} 次`;
  updateExAnim(ex.name, true);
  updateInstructions(ex);
}

function updateInstructions(ex) {
  const body = document.getElementById('exInstructionsBody');
  if (!body) return;
  let html = '';
  (ex.steps || []).forEach((step, i) => {
    html += `<div class="ex-step"><span class="ex-step-num">${i+1}.</span><span>${step}</span></div>`;
  });
  if (ex.warn) {
    html += `<div class="ex-warn">⚠️ ${ex.warn}</div>`;
  }
  body.innerHTML = html;
}

function setPhase(phase) {
  const lbl = document.getElementById('phaseLabel');
  lbl.className = 'phase-label';
  if (phase === 'working') { lbl.classList.add('phase-working'); lbl.textContent = '训练中'; }
  else if (phase === 'rest') { lbl.classList.add('phase-rest'); lbl.textContent = '休息中'; }
  else if (phase === 'done') { lbl.classList.add('phase-done'); lbl.textContent = '完成！'; }
}

function showTimer(show) {
  document.getElementById('timerBlock').style.display = show ? 'flex' : 'none';
}

// ── Mark exercise done in list ──
function markExDone(i) {
  const el = document.getElementById('wi-' + i);
  if (el) { el.classList.remove('active'); el.classList.add('done'); }
}
function setActiveEx(i) {
  EXERCISES.forEach((_,j) => {
    const el = document.getElementById('wi-' + j);
    if (el) el.classList.remove('active');
  });
  const el = document.getElementById('wi-' + i);
  if (el) el.classList.add('active');
}

// ── Core flow ──
function startWorkout() {
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnPause').disabled = false;
  document.getElementById('btnReset').disabled = false;
  exIdx = 0; setIdx = 0; setsCompleted = 0;
  beginSet();
}

function beginSet() {
  state = 'working';
  const ex = EXERCISES[exIdx];
  showActive(ex);
  setPhase('working');
  showTimer(false);
  setActiveEx(exIdx);
  updateProgress();

  const prompt = `开始${ex.name}，第${setIdx+1}组，${ex.reps}次`;
  speak(prompt, () => {
    // After announcement, just wait — user taps "组完成" or we auto-advance
    // We show a "完成本组" button
    showFinishSetBtn(true);
  });
}

function showFinishSetBtn(show) {
  let btn = document.getElementById('btnFinishSet');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'btnFinishSet';
    btn.className = 'btn btn-start';
    btn.style.maxWidth = '480px';
    btn.style.width = '100%';
    btn.style.marginBottom = '12px';
    btn.onclick = finishSet;
    // insert before btn-row
    const brow = document.querySelector('.btn-row');
    brow.parentNode.insertBefore(btn, brow);
  }
  btn.style.display = show ? 'block' : 'none';
  btn.textContent = `✅  第 ${setIdx+1} 组完成`;
}

function finishSet() {
  if (state !== 'working') return;
  showFinishSetBtn(false);
  setsCompleted++;
  const ex = EXERCISES[exIdx];
  speak(`${ex.name}第${setIdx+1}组完成`, () => {
    // Determine rest duration and next action
    const isLastSet = (setIdx + 1 >= ex.sets);
    const isLastEx  = (exIdx + 1 >= EXERCISES.length);

    if (isLastSet && isLastEx) {
      // Workout done
      markExDone(exIdx);
      finishWorkout();
    } else if (isLastSet) {
      // Rest between exercises (longer)
      markExDone(exIdx);
      startRest(ex.restEx, true);
    } else {
      // Rest between sets
      startRest(ex.restSet, false);
    }
  });
}

function startRest(seconds, isExerciseRest) {
  state = 'resting';
  timerTotal = seconds;
  timerRemaining = seconds;
  setPhase('rest');
  showTimer(true);
  updateRing(timerRemaining, timerTotal);

  const label = document.getElementById('timerLabel');
  label.textContent = isExerciseRest ? '换动作休息' : '组间休息';

  setAnimPaused(true);
  speak(`休息${seconds}秒`, () => {
    runTimer(isExerciseRest);
  });
}

function runTimer(isExerciseRest) {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (state === 'paused') return;
    timerRemaining--;
    updateRing(timerRemaining, timerTotal);

    if (timerRemaining === 10) speak('还有十秒');
    if (timerRemaining === 3)  speak('三');
    if (timerRemaining === 2)  speak('二');
    if (timerRemaining === 1)  speak('一');

    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      showTimer(false);
      if (isExerciseRest) {
        exIdx++;
        setIdx = 0;
      } else {
        setIdx++;
      }
      speak('开始', () => { setAnimPaused(false); beginSet(); });
    }
  }, 1000);
}

function finishWorkout() {
  state = 'done';
  setPhase('done');
  showTimer(false);
  showFinishSetBtn(false);
  updateProgress();
  document.getElementById('btnPause').disabled = true;

  // Show completion in main card
  document.getElementById('activeContent').style.display = 'none';
  document.getElementById('idleMsg').style.display = 'block';
  setAnimPaused(true);
  document.getElementById('idleMsg').innerHTML =
    `<strong>🎉 训练完成！</strong>4 个动作全部完成<br>干得好，Suki！💪`;

  speak('今天的训练完成了，干得好！', () => {
    setTimeout(() => {
      document.getElementById('overlay').classList.add('show');
    }, 800);
  });
}

function togglePause() {
  const btn = document.getElementById('btnPause');
  if (state === 'resting') {
    state = 'paused';
    btn.textContent = '继续';
    synth.pause();
  } else if (state === 'paused') {
    state = 'resting';
    btn.textContent = '暂停';
    synth.resume();
  } else if (state === 'working') {
    // pause mid-set: just mute voice, keep UI
    state = 'paused';
    btn.textContent = '继续';
    synth.cancel();
  }
}

function resetWorkout() {
  clearInterval(timerInterval);
  synth.cancel();
  state = 'idle';
  exIdx = 0; setIdx = 0; setsCompleted = 0;
  speaking = false;
  updateVoiceDot();

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnPause').disabled = true;
  document.getElementById('btnPause').textContent = '暂停';
  document.getElementById('btnReset').disabled = true;
  showTimer(false);
  showFinishSetBtn(false);

  document.getElementById('activeContent').style.display = 'none';
  document.getElementById('idleMsg').style.display = 'block';
  document.getElementById('idleMsg').innerHTML =
    `<strong>准备好了吗？</strong>点击下方「开始训练」<br>语音将全程引导你完成<br>今天的 4 个动作`;

  // Reset list
  EXERCISES.forEach((_,i) => {
    const el = document.getElementById('wi-' + i);
    if (el) { el.classList.remove('active','done'); }
  });
  updateProgress();
  document.getElementById('progressText').textContent = '准备开始';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressPct').textContent = '0%';
}

function updateExAnim(exName, playing) {
  const svg = document.getElementById('exAnimSvg');
  const wrap = document.getElementById('exAnimWrap');
  if (!svg || !wrap) return;
  const markup = ANIM_SVGS[exName];
  if (markup) {
    svg.innerHTML = markup;
  } else {
    svg.innerHTML = '';
  }
  if (playing) {
    wrap.classList.remove('anim-paused');
  } else {
    wrap.classList.add('anim-paused');
  }
}

function setAnimPaused(paused) {
  const wrap = document.getElementById('exAnimWrap');
  if (!wrap) return;
  if (paused) wrap.classList.add('anim-paused');
  else wrap.classList.remove('anim-paused');
}

  synth.speak(u);
  document.removeEventListener('touchstart', warmup);
}, {once:true});
